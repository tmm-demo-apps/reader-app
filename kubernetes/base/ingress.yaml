apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reader-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
  - host: PLACEHOLDER_HOST  # Patched by overlays
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: reader-service
            port:
              number: 8081
