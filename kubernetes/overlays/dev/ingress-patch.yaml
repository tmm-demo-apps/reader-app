apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reader-ingress
spec:
  rules:
  - host: reader-dev.example.com  # Update for your environment
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: reader-service
            port:
              number: 8081
