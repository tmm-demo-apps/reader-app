apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reader-ingress
spec:
  rules:
  - host: reader.corp.vmbeans.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: reader-service
            port:
              number: 8081
