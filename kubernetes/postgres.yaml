apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: reader-postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: reader-postgres
spec:
  serviceName: reader-postgres
  replicas: 1
  selector:
    matchLabels:
      app: reader-postgres
  template:
    metadata:
      labels:
        app: reader-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: reader
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: reader-secrets
              key: postgres-password
        - name: POSTGRES_DB
          value: reader
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: init-scripts
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: reader-postgres-pvc
      - name: init-scripts
        configMap:
          name: reader-migrations
---
apiVersion: v1
kind: Service
metadata:
  name: reader-postgres
spec:
  selector:
    app: reader-postgres
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None
