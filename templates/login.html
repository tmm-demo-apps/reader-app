{{template "base" .}}

{{define "title"}}Login{{end}}

{{define "content"}}
<article style="max-width: 400px; margin: 2rem auto;">
    <header>
        <h2>📚 Library Reader</h2>
        <p>Sign in to access your book library</p>
    </header>
    <form method="POST" action="/login">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your bookstore email" required>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
        {{if .Error}}
        <p style="color: var(--pico-del-color);"><small>{{.Error}}</small></p>
        {{end}}
        <button type="submit">Login</button>
    </form>
    <footer>
        <small>
            Don't have an account? 
            <a href="{{.BookstoreURL}}/signup">Create one at the Bookstore</a>
        </small>
    </footer>
</article>
{{end}}

{{define "scripts"}}{{end}}
